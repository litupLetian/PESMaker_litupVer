name: Build and publish Python package

on:
  pull_request:
    paths:
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - "NOTICE"
      - "src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - "NOTICE"
      - "src/**"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check --strict dist/*

      - name: Smoke test the built wheel
        shell: bash
        run: |
          python -m pip install dist/*.whl
          pesmaker --help

      - name: Check release tag matches package version
        if: github.event_name == 'release'
        shell: bash
        run: |
          PACKAGE_VERSION="$(python -c 'from importlib.metadata import version; print(version("pesmaker"))')"
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${PACKAGE_VERSION}" != "${RELEASE_VERSION}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pesmaker
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
