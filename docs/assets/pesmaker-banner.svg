<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">PESMaker cartoon potential energy surface banner</title>
  <desc id="desc">A cartoon potential energy surface with PESMaker selecting the right atomic training points.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#edf7ff"/>
    </linearGradient>
    <linearGradient id="titleBlue" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2637ff"/>
      <stop offset="0.55" stop-color="#1769e8"/>
      <stop offset="1" stop-color="#00a6c8"/>
    </linearGradient>
    <linearGradient id="surfaceHot" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8a6"/>
      <stop offset="0.24" stop-color="#ffd13d"/>
      <stop offset="0.48" stop-color="#ff7a2f"/>
      <stop offset="0.72" stop-color="#7f4acb"/>
      <stop offset="1" stop-color="#1b52b8"/>
    </linearGradient>
    <linearGradient id="surfaceCool" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#47d4ff"/>
      <stop offset="1" stop-color="#2349d8"/>
    </linearGradient>
    <radialGradient id="redAtom" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="0.38" stop-color="#ffba55"/>
      <stop offset="1" stop-color="#e33a23"/>
    </radialGradient>
    <radialGradient id="blueAtom" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#f2fbff"/>
      <stop offset="0.4" stop-color="#6bd7ff"/>
      <stop offset="1" stop-color="#1464dc"/>
    </radialGradient>
    <radialGradient id="greenAtom" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#f7ffef"/>
      <stop offset="0.4" stop-color="#a0e85c"/>
      <stop offset="1" stop-color="#22a75a"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0a2455" flood-opacity="0.18"/>
    </filter>
    <filter id="tinyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#0a2455" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="url(#sky)"/>
  <circle cx="1360" cy="88" r="170" fill="#dff6ff" opacity="0.72"/>
  <circle cx="126" cy="430" r="210" fill="#eef2ff" opacity="0.95"/>

  <g transform="translate(72 58)">
    <text x="0" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="78" font-weight="850" fill="url(#titleBlue)">PESMaker</text>
    <text x="4" y="125" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="650" fill="#17335f">Potential Energy Surface Maker</text>
    <text x="4" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" fill="#2e466b">Find the right structures on the energy landscape, then label and train.</text>

    <g transform="translate(0 226)">
      <rect x="0" y="0" width="430" height="132" rx="24" fill="#ffffff" stroke="#cddfff" filter="url(#tinyShadow)"/>
      <text x="28" y="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" fill="#0e2d67">What PESMaker does</text>
      <circle cx="34" cy="70" r="5" fill="#245ee8"/>
      <text x="52" y="77" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" fill="#263b61">builds surfaces, defects, and perturbations</text>
      <circle cx="34" cy="98" r="5" fill="#245ee8"/>
      <text x="52" y="105" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" fill="#263b61">samples and selects representative frames</text>
      <circle cx="34" cy="126" r="5" fill="#245ee8"/>
      <text x="52" y="133" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" fill="#263b61">prepares DFT labels and ML potential training</text>
    </g>
  </g>

  <g transform="translate(650 62)" filter="url(#softShadow)">
    <path d="M54 328 C114 260 170 348 236 292 C306 232 348 162 428 204 C488 236 548 238 614 172 C674 112 730 150 792 104 L792 362 C724 416 672 386 612 428 C544 476 486 416 424 430 C352 446 310 522 234 462 C164 406 112 486 54 420 Z" fill="url(#surfaceHot)"/>
    <path d="M54 328 C114 260 170 348 236 292 C306 232 348 162 428 204 C488 236 548 238 614 172 C674 112 730 150 792 104" fill="none" stroke="#122c68" stroke-width="6" stroke-linecap="round"/>
    <path d="M90 360 C154 306 196 386 262 338 C328 288 374 226 444 256 C506 282 560 288 632 230 C694 184 734 202 776 166" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
    <path d="M98 414 C160 358 210 432 276 388 C346 340 394 294 462 316 C524 336 578 350 646 306 C704 268 742 280 780 244" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.48"/>
    <path d="M118 286 L154 262 M196 338 L232 292 M300 292 L342 224 M444 256 L428 204 M560 288 L614 172 M704 184 L730 150" stroke="#0b2c6f" stroke-width="3" opacity="0.22"/>

    <g filter="url(#tinyShadow)">
      <circle cx="154" cy="262" r="19" fill="url(#blueAtom)" stroke="#123b8e" stroke-width="3"/>
      <circle cx="232" cy="292" r="19" fill="url(#redAtom)" stroke="#8f2e17" stroke-width="3"/>
      <circle cx="342" cy="224" r="20" fill="url(#greenAtom)" stroke="#167842" stroke-width="3"/>
      <circle cx="428" cy="204" r="19" fill="url(#blueAtom)" stroke="#123b8e" stroke-width="3"/>
      <circle cx="614" cy="172" r="20" fill="url(#redAtom)" stroke="#8f2e17" stroke-width="3"/>
      <circle cx="730" cy="150" r="19" fill="url(#greenAtom)" stroke="#167842" stroke-width="3"/>
      <circle cx="276" cy="388" r="15" fill="url(#blueAtom)" stroke="#123b8e" stroke-width="3"/>
      <circle cx="646" cy="306" r="15" fill="url(#redAtom)" stroke="#8f2e17" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(1036 104)" filter="url(#tinyShadow)">
    <circle cx="0" cy="0" r="58" fill="#ffffff" stroke="#172a60" stroke-width="5"/>
    <circle cx="0" cy="0" r="34" fill="#dff9ff" stroke="#188fd0" stroke-width="5"/>
    <circle cx="0" cy="0" r="10" fill="#ff3b2f"/>
    <path d="M-78 0 H-20 M20 0 H78 M0 -78 V-20 M0 20 V78" stroke="#172a60" stroke-width="6" stroke-linecap="round"/>
    <path d="M-37 -37 L-64 -64 M37 37 L64 64 M37 -37 L64 -64 M-37 37 L-64 64" stroke="#188fd0" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(1132 122)">
    <path d="M0 0 C74 24 120 74 162 126" fill="none" stroke="#193c8f" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 12"/>
    <path d="M162 126 l-32 -4 19 26 z" fill="#193c8f"/>
    <text x="54" y="-16" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="760" fill="#193c8f">pick the right points</text>
  </g>

  <g transform="translate(1120 304)">
    <rect x="0" y="0" width="404" height="102" rx="26" fill="#122c68" opacity="0.96"/>
    <text x="30" y="40" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="780" fill="#ffffff">smart workflow</text>
    <text x="30" y="70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" fill="#d9ecff">plan first -> dry-run submit -> continue from files</text>
  </g>

  <g transform="translate(80 468)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#4d6388">For application-oriented MLIP datasets: structures, sampling, DFT labels, extxyz datasets, and NEP training.</text>
  </g>
</svg>
